name: PR Tests

on:
  pull_request:
    branches: [ master ]

permissions:
  contents: read
  pull-requests: write

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

    - name: Set up JDK 24
      uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5
      with:
        java-version: '24'
        distribution: 'temurin'

    - name: Setup SBT
      uses: sbt/setup-sbt@6444f4c8111de4b9059c3975def104b03cfaa5f0 # v1

    - name: Cache SBT dependencies
      uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
      with:
        path: |
          ~/.sbt
          ~/.coursier/cache
          ~/.cache/coursier
        key: ${{ runner.os }}-sbt-${{ hashFiles('**/build.sbt', 'project/**') }}
        restore-keys: |
          ${{ runner.os }}-sbt-

    - name: Compile
      run: sbt compile

    - name: Run tests
      run: sbt test

    - name: TestGlance
      if: always()
      uses: testglance/action@7961683867f53f865cb000b0b9a92a34c841deef # v1
      with:
        github-token: ${{ github.token }}
        report-path: '**/target/test-reports/TEST-*.xml'