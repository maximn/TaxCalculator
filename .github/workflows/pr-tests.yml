name: PR Tests

on:
  pull_request:
    branches: [ master ]

permissions:
  contents: read
  pull-requests: write

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v7

    - name: Set up JDK 24
      uses: actions/setup-java@v5
      with:
        java-version: '24'
        distribution: 'temurin'

    - name: Setup SBT
      uses: sbt/setup-sbt@v1

    - name: Cache SBT dependencies
      uses: actions/cache@v6
      with:
        path: |
          ~/.sbt
          ~/.coursier/cache
          ~/.cache/coursier
        key: ${{ runner.os }}-sbt-${{ hashFiles('**/build.sbt', 'project/**') }}
        restore-keys: |
          ${{ runner.os }}-sbt-

    - name: Compile
      run: sbt compile

    - name: Run tests
      run: sbt test

    - name: TestGlance
      if: always()
      uses: testglance/action@90957b3248d5f6b5fa7d8c57a92fce8d3f20203a # v1
      with:
        github-token: ${{ github.token }}
        report-path: '**/target/test-reports/TEST-*.xml'